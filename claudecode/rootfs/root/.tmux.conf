# tmux config for the ttyd web terminal. Claude Code runs in fullscreen rendering mode
# (CLAUDE_CODE_NO_FLICKER=1), which needs mouse mode ON so wheel events reach Claude —
# use Shift+click-drag for native browser text selection instead.
set -g  default-terminal "screen-256color"
set -as terminal-overrides ",xterm*:RGB"
# Advertise OSC 52 clipboard on the outer terminal (handled by the add-on's ttyd index page)
set -as terminal-overrides ',xterm*:Ms=\E]52;%p1%s;%p2%s\007'
set -g  history-limit 50000
set -g  mouse on
set -g  set-clipboard on
# Claude Code wraps OSC 52 in a DCS passthrough inside tmux — without this it is dropped
set -g  allow-passthrough on
set -s  escape-time 0
set -g  focus-events on
# With multiple attached clients (--max-clients 5), size to the most recent one
set -g  window-size latest
set -g  status off

# User overrides, loaded last so they win over the defaults above and survive add-on
# rebuilds (this file is baked into the image; the override file lives in persisted config).
# Example — restore native browser copy/paste by turning mouse mode off (note: this also
# disables wheel-scrolling of Claude Code's fullscreen buffer):
#   echo 'set -g mouse off' > /homeassistant/.claudecode/tmux.conf
# Applied at tmux server start — run `tmux kill-server` or restart the add-on to reload.
source-file -q /homeassistant/.claudecode/tmux.conf
