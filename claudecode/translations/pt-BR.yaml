configuration:
  enable_mcp:
    name: Habilitar MCP do Home Assistant
    description: >-
      Habilita o servidor MCP do Home Assistant para interação direta com
      entidades e serviços pelo Claude Code. Permite que o Claude consulte
      estados, chame serviços e interaja com sua casa inteligente.
  enable_playwright_mcp:
    name: Habilitar MCP Playwright
    description: >-
      Habilita o servidor MCP Playwright para automação de navegador. Requer o
      add-on "Playwright Browser" instalado e em execução. Permite que o Claude
      navegue em páginas web, preencha formulários, clique em elementos e tire
      screenshots.
  playwright_cdp_host:
    name: Host CDP do Playwright
    description: >-
      Nome do host do add-on Playwright Browser para conexão CDP. Deixe vazio
      para o padrão (playwright-browser). Se a conexão falhar, verifique o
      nome do host do container Playwright Browser (ex: 1016f397-playwright-browser).
  terminal_font_size:
    name: Tamanho da Fonte do Terminal
    description: >-
      Tamanho da fonte do terminal web em pixels (10-24).
      Ajuste para melhor legibilidade no seu monitor.
  terminal_theme:
    name: Tema do Terminal
    description: >-
      Tema de cores do terminal web.
      Escolha 'dark' para fundo escuro ou 'light' para fundo claro.
  working_directory:
    name: Diretório de Trabalho
    description: >-
      O diretório padrão quando o Claude Code inicia.
      Use /homeassistant para acesso direto aos arquivos de configuração do HA.
  session_persistence:
    name: Persistência de Sessão
    description: >-
      Mantém sua sessão ativa entre reconexões (usando tmux). Quando habilitado, sua sessão
      e o histórico visível sobrevivem a atualizações do navegador, fechamento de abas e
      quedas de conexão. Recomendado para tarefas de longa duração.
  auto_update_claude:
    name: Atualização Automática do Claude Code
    description: >-
      Verifica e instala atualizações do Claude Code automaticamente — ao iniciar e a cada
      hora em execução. Mantém o Claude Code atualizado sem precisar atualizar o add-on.
  model:
    name: Modelo Claude
    description: >-
      Escolha um modelo. "default" usa o padrão da sua conta Claude (troque com /model na
      sessão). "claude-fable-5" é o mais capaz (novo nível acima do Opus); as variantes "[1m]"
      usam o mesmo modelo com janela de contexto de 1M tokens (disponibilidade e preço dependem
      do seu plano). Escolha "custom" para usar qualquer id informado em Modelo (personalizado)
      abaixo — útil para modelos novos fora desta lista, sem atualizar o add-on.
  model_custom:
    name: Modelo (personalizado)
    description: >-
      Usado apenas quando Modelo está como "custom". Informe o id exato do modelo,
      ex.: claude-fable-5. Se vazio, o padrão da conta é usado.
  enable_remote_control:
    name: Habilitar Controle Remoto
    description: >-
      Inicia automaticamente o Claude Code com Controle Remoto habilitado em cada sessão.
      Permite visualizar e controlar sua sessão local do Claude Code pelo claude.ai/code
      ou pelo aplicativo móvel do Claude. Requer assinatura claude.ai Pro, Max, Team ou
      Enterprise (chaves de API não são suportadas). Nota de segurança: este add-on é
      executado como root com acesso total ao seu servidor Home Assistant, então qualquer
      pessoa que consiga entrar na conta Claude vinculada poderá controlá-lo. Mantenha
      desativado a menos que precise.
  remote_control_session_prefix:
    name: Prefixo do Nome da Sessão de Controle Remoto
    description: >-
      Prefixo para nomes de sessão de Controle Remoto gerados automaticamente, visível
      no claude.ai/code e no aplicativo móvel do Claude. O padrão é "HomeAssistant",
      gerando nomes como "HomeAssistant-graceful-unicorn". Aplicável apenas quando o
      Controle Remoto está habilitado.
  restrict_terminal_port:
    name: Restringir Porta do Terminal (experimental)
    description: >-
      Protege com firewall a porta do terminal web (7681) para permitir apenas o ingress do
      Home Assistant, de modo que outros contêineres de add-ons na rede interna não consigam
      acessar o shell root. Desativado por padrão e marcado como experimental — usa iptables
      dentro do contêiner. Falha de forma aberta (nunca bloqueia o ingress) se o iptables não
      estiver disponível, mas verifique se o terminal ainda carrega após ativar.

network:
  7681/tcp: Terminal Web (ttyd)
