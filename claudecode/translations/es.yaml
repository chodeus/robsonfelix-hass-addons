configuration:
  enable_mcp:
    name: Habilitar MCP de Home Assistant
    description: >-
      Habilita el servidor MCP de Home Assistant para interacción directa con
      entidades y servicios desde Claude Code. Permite que Claude consulte
      estados, llame servicios e interactúe con tu hogar inteligente.
  enable_playwright_mcp:
    name: Habilitar MCP Playwright
    description: >-
      Habilita el servidor MCP Playwright para automatización del navegador. Requiere
      el add-on "Playwright Browser" instalado y ejecutándose. Permite que Claude
      navegue páginas web, complete formularios, haga clic en elementos y tome
      capturas de pantalla.
  playwright_cdp_host:
    name: Host CDP de Playwright
    description: >-
      Nombre del host del add-on Playwright Browser para conexión CDP. Deja vacío
      para el predeterminado (playwright-browser). Si la conexión falla, verifica el
      nombre del host del contenedor Playwright Browser (ej: 1016f397-playwright-browser).
  terminal_font_size:
    name: Tamaño de Fuente del Terminal
    description: >-
      Tamaño de fuente del terminal web en píxeles (10-24).
      Ajusta para mejor legibilidad en tu pantalla.
  terminal_theme:
    name: Tema del Terminal
    description: >-
      Tema de colores del terminal web.
      Elige 'dark' para fondo oscuro o 'light' para fondo claro.
  working_directory:
    name: Directorio de Trabajo
    description: >-
      El directorio predeterminado cuando Claude Code inicia.
      Usa /homeassistant para acceso directo a los archivos de configuración de HA.
  session_persistence:
    name: Persistencia de Sesión
    description: >-
      Mantén tu sesión activa entre reconexiones (usando tmux). Cuando está habilitado, tu sesión
      y su historial visible sobreviven a actualizaciones del navegador, cierres de pestaña y
      cortes de conexión. Recomendado para tareas de larga duración.
  auto_update_claude:
    name: Actualización Automática de Claude Code
    description: >-
      Verifica e instala actualizaciones de Claude Code automáticamente — al iniciar y cada
      hora mientras se ejecuta. Mantiene Claude Code actualizado sin actualizar el add-on.
  model:
    name: Modelo Claude
    description: >-
      Elige un modelo. "default" usa el predeterminado de tu cuenta Claude (cambia con /model
      en la sesión). "claude-fable-5" es el más capaz (nuevo nivel superior a Opus); las variantes
      "[1m]" usan el mismo modelo con ventana de contexto de 1M tokens (disponibilidad y precio
      dependen de tu plan). Elige "custom" para usar cualquier id indicado en Modelo
      (personalizado) abajo — útil para modelos nuevos que no están en la lista, sin actualizar
      el add-on.
  model_custom:
    name: Modelo (personalizado)
    description: >-
      Se usa solo cuando Modelo está en "custom". Indica el id exacto del modelo,
      ej.: claude-fable-5. Si se deja vacío, se usa el predeterminado de la cuenta.
  enable_remote_control:
    name: Habilitar Control Remoto
    description: >-
      Inicia automáticamente Claude Code con Control Remoto habilitado en cada sesión.
      Permite ver y controlar tu sesión local de Claude Code desde claude.ai/code
      o la aplicación móvil de Claude. Requiere suscripción claude.ai Pro, Max, Team o
      Enterprise (las claves de API no son compatibles). Nota de seguridad: este add-on
      se ejecuta como root con acceso completo a tu servidor de Home Assistant, por lo
      que cualquiera que pueda iniciar sesión en la cuenta de Claude vinculada podrá
      controlarlo. Déjalo desactivado salvo que lo necesites.
  remote_control_session_prefix:
    name: Prefijo del Nombre de Sesión de Control Remoto
    description: >-
      Prefijo para los nombres de sesión de Control Remoto generados automáticamente,
      visible en claude.ai/code y la aplicación móvil de Claude. El valor predeterminado
      es "HomeAssistant", generando nombres como "HomeAssistant-graceful-unicorn". Solo
      aplica cuando el Control Remoto está habilitado.
  restrict_terminal_port:
    name: Restringir Puerto del Terminal (experimental)
    description: >-
      Protege con firewall el puerto del terminal web (7681) para permitir solo el ingress de
      Home Assistant, de modo que otros contenedores de add-ons en la red interna no puedan
      acceder a la shell de root. Desactivado por defecto y marcado como experimental — usa
      iptables dentro del contenedor. Falla de forma abierta (nunca bloquea el ingress) si
      iptables no está disponible, pero verifica que el terminal aún cargue tras activarlo.

network:
  7681/tcp: Terminal Web (ttyd)
