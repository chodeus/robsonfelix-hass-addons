configuration:
  enable_mcp:
    name: Enable Home Assistant MCP
    description: >-
      Enable the Home Assistant MCP server for direct entity and service
      interaction from Claude Code. Allows Claude to query states, call services,
      and interact with your smart home.
  enable_playwright_mcp:
    name: Enable Playwright MCP
    description: >-
      Enable the Playwright MCP server for browser automation. Requires the
      "Playwright Browser" add-on to be installed and running. Allows Claude to
      navigate web pages, fill forms, click elements, and take screenshots.
  playwright_cdp_host:
    name: Playwright CDP Host
    description: >-
      Hostname of the Playwright Browser add-on for CDP connection. Leave empty
      for default (playwright-browser). If connection fails, check the Playwright
      Browser container hostname (e.g., 1016f397-playwright-browser).
  terminal_font_size:
    name: Terminal Font Size
    description: >-
      Font size for the web terminal in pixels (10-24).
      Adjust for readability on your display.
  terminal_theme:
    name: Terminal Theme
    description: >-
      Color theme for the web terminal.
      Choose 'dark' for dark backgrounds or 'light' for light backgrounds.
  working_directory:
    name: Working Directory
    description: >-
      The default working directory when Claude Code starts.
      Use /homeassistant for direct access to HA configuration files.
  session_persistence:
    name: Session Persistence
    description: >-
      Keep your terminal session alive across reconnects (using dtach). When enabled, your
      session survives browser refreshes and disconnects. Recommended for long-running tasks.
  auto_update_claude:
    name: Auto-update Claude Code
    description: >-
      Automatically check for and install Claude Code updates — on startup and hourly
      while running. Keeps Claude Code current without add-on version bumps.
  model:
    name: Claude Model
    description: >-
      Leave empty to use your Claude account default (and switch with /model in a session).
      To pin a model, enter its id, e.g. claude-opus-4-7, claude-sonnet-4-6, or
      claude-haiku-4-5-20251001. Any valid model id works — no add-on update needed.

network:
  7681/tcp: Web Terminal (ttyd)
