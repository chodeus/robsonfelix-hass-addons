configuration:
  enable_mcp:
    name: Enable Home Assistant MCP
    description: >-
      Enable the Home Assistant MCP server for direct entity and service
      interaction from Claude Code. Allows Claude to query states, call services,
      and interact with your smart home.
  enable_playwright_mcp:
    name: Enable Playwright MCP
    description: >-
      Enable the Playwright MCP server for browser automation. Requires the
      "Playwright Browser" add-on to be installed and running. Allows Claude to
      navigate web pages, fill forms, click elements, and take screenshots.
  playwright_cdp_host:
    name: Playwright CDP Host
    description: >-
      Hostname of the Playwright Browser add-on for CDP connection. Leave empty
      for default (playwright-browser). If connection fails, check the Playwright
      Browser container hostname (e.g., 1016f397-playwright-browser).
  terminal_font_size:
    name: Terminal Font Size
    description: >-
      Font size for the web terminal in pixels (10-24).
      Adjust for readability on your display.
  terminal_theme:
    name: Terminal Theme
    description: >-
      Color theme for the web terminal.
      Choose 'dark' for dark backgrounds or 'light' for light backgrounds.
  working_directory:
    name: Working Directory
    description: >-
      The default working directory when Claude Code starts.
      Use /homeassistant for direct access to HA configuration files.
  session_persistence:
    name: Session Persistence
    description: >-
      Keep your terminal session alive across reconnects (using tmux). When enabled, your
      session and its visible history survive browser refreshes, tab closes, and connection
      blips. Recommended for long-running tasks.
  auto_update_claude:
    name: Auto-update Claude Code
    description: >-
      Automatically check for and install Claude Code updates — on startup and hourly
      while running. Keeps Claude Code current without add-on version bumps.
  model:
    name: Claude Model
    description: >-
      Pick a model. "default" uses your Claude account default (switch with /model in a
      session). "claude-fable-5" is the most capable (new top tier above Opus); the "[1m]"
      variants use the same model with the 1M-token context window (availability and pricing
      depend on your plan). Choose "custom" to use any model id entered in Model (custom)
      below — handy for newer models not in this list, with no add-on update needed.
  model_custom:
    name: Model (custom)
    description: >-
      Only used when Model is set to "custom". Enter the exact model id,
      e.g. claude-fable-5. If left empty, the account default is used.
  enable_remote_control:
    name: Enable Remote Control
    description: >-
      Automatically start Claude Code with Remote Control enabled for every session.
      Allows you to view and steer your local Claude Code session from claude.ai/code
      or the Claude mobile app. Requires a claude.ai Pro, Max, Team, or Enterprise
      subscription (API keys are not supported). Security note: this add-on runs as
      root with full access to your Home Assistant host, so anyone who can sign in to
      the linked Claude account can control it. Leave this off unless you need it.
  remote_control_session_prefix:
    name: Remote Control Session Name Prefix
    description: >-
      Prefix for auto-generated Remote Control session names visible in claude.ai/code
      and the Claude mobile app. Defaults to "HomeAssistant", producing names like
      "HomeAssistant-graceful-unicorn". Only applies when Enable Remote Control is on.
  restrict_terminal_port:
    name: Restrict Terminal Port (experimental)
    description: >-
      Firewall the web terminal port (7681) to Home Assistant ingress only, so other add-on
      containers on the internal network can't reach the root shell. Off by default and marked
      experimental — it relies on iptables inside the container. It fails open (never blocks
      ingress) if iptables is unavailable, but test that the terminal still loads after enabling.

network:
  7681/tcp: Web Terminal (ttyd)
