name: Claude Code
description: Run Claude Code AI assistant inside Home Assistant to create automations, debug issues, and manage your smart home configuration
version: "2.8.1"
slug: claudecode
url: https://github.com/chodeus/robsonfelix-hass-addons
# Claude Code ships platform binaries for x64/arm64 only (incl. musl) — 32-bit arches
# (armv7/armhf/i386) cannot run it and were dropped in 2.7.0.
arch:
  - amd64
  - aarch64
# Pre-built by .github/workflows/builder.yaml — the published tag must match `version`
# above before this file referencing it lands (the workflow pushes on merge to main).
image: ghcr.io/chodeus/claudecode-{arch}
# startup: application, boot: auto, init: true (Docker tini) are the Supervisor defaults —
# left unset per the add-on linter; do NOT set init: false (that switches to s6-overlay /init)
ingress: true
ingress_port: 7681
ingress_stream: true
panel_icon: mdi:brain
panel_title: Claude Code
homeassistant_api: true
auth_api: true
hassio_api: true
hassio_role: manager
docker_api: true
# full_access already maps all host devices (incl. serial/UART), so no separate uart flag
full_access: true
map:
  - homeassistant_config:rw
  - ssl:ro
  - share:rw
  - media:rw
  - addon_config:rw
  - backup:ro
options:
  enable_mcp: true
  enable_playwright_mcp: false
  playwright_cdp_host: ""
  terminal_font_size: 14
  terminal_theme: dark
  working_directory: /homeassistant
  session_persistence: true
  auto_update_claude: false
  model: default
  model_custom: ""
  enable_remote_control: false
  remote_control_session_prefix: HomeAssistant
  restrict_terminal_port: false
schema:
  enable_mcp: bool
  enable_playwright_mcp: bool
  playwright_cdp_host: str?
  terminal_font_size: int(10,24)
  terminal_theme: list(dark|light)
  working_directory: str
  session_persistence: bool
  auto_update_claude: bool
  model: list(default|claude-fable-5|claude-fable-5[1m]|claude-opus-4-8|claude-opus-4-8[1m]|claude-opus-4-7|claude-sonnet-4-6|claude-haiku-4-5|custom)
  model_custom: str?
  enable_remote_control: bool
  remote_control_session_prefix: str
  restrict_terminal_port: bool
environment:
  TERM: xterm-256color
