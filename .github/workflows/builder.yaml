name: Builder

on:
  push:
    branches: [main]
    paths:
      - claudecode/**
      - .github/workflows/builder.yaml
  pull_request:
    branches: [main]
    paths:
      - claudecode/**
      - .github/workflows/builder.yaml
  workflow_dispatch:

jobs:
  lint:
    name: Lint add-on
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2
        with:
          path: ./claudecode

  build:
    name: Build ${{ matrix.arch }}
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publishes ghcr.io/chodeus/claudecode-{arch}:<version from config.yaml>.
      # PRs run with --test (build only, no push). The add-on keeps building locally on
      # users' machines until config.yaml's `image:` key is uncommented — only do that
      # after this workflow has published PUBLIC images for the release version.
      - name: Build ${{ matrix.arch }} add-on
        uses: home-assistant/builder@71885366c80f6ead6ae8c364b61d910e0dc5addc # 2025.03.0
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/claudecode \
            --image claudecode-{arch} \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --addon ${{ github.event_name == 'pull_request' && '--test' || '' }}
