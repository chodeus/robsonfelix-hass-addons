name: Builder

on:
  push:
    branches: [main]
    paths:
      - claudecode/**
      - .github/workflows/builder.yaml
  pull_request:
    branches: [main]
    paths:
      - claudecode/**
      - .github/workflows/builder.yaml
  workflow_dispatch:

jobs:
  lint:
    name: Lint add-on
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: ./claudecode

  build:
    name: Build ${{ matrix.arch }}
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publishes ghcr.io/chodeus/claudecode-{arch}:<version from config.yaml>.
      # PRs run with --test (build only, no push). The add-on keeps building locally on
      # users' machines until config.yaml's `image:` key is uncommented — only do that
      # after this workflow has published PUBLIC images for the release version.
      - name: Build ${{ matrix.arch }} add-on
        uses: home-assistant/builder@2025.03.0
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/claudecode \
            --image claudecode-{arch} \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --addon ${{ github.event_name == 'pull_request' && '--test' || '' }}
